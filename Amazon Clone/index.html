<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header id="navbar">
        <div id="navbar_belt">
            <div id="navbar_logo">
                <a href="index.html">
                    <img src="amazon_logo.webp" alt="Amazon Logo" id="navbar_logo_img">
                </a>
            </div>
            <div id="location">
                <div id="location_icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="location_text">
                    <div id="location1">Deliver to</div><br>
                    <div id="location2">India</div>
                </div>
            </div>
            <div id="search">
                <div id="search_category">
                    <select id="search_category_select">
                        <option value="all">All</option>
                        <option value="books">Books</option>
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="home">Home & Kitchen</option>
                    </select>
                </div>
                <div>
                    <input type="text" id="search_input" placeholder="Search Amazon">
                </div>
                <div id="search_icon">
                    <button id="search_button">
                        <i class="fa-solid fa-magnifying-glass"></i></i>
                    </button>
                </div>
            </div>
            <div id="language_select">
                <div id="language_icon">
                    <img src="language_icon.png" alt="Language Icon">
                </div>
                <div id="lang_menu">
                    <select>
                        <option value="EN">EN</option>
                        <option value="ES">ES</option>
                        <option value="FR">FR</option>
                        <option value="AR">AR</option>
                        <option value="DE">DE</option>
                        <option value="HE">HE</option>
                    </select>
                </div>
            </div>
            <div id="signin">
                <div id="signin_text">Hello, Sign in</div>
                <div id="signin_list"><select><option value="accounts">Accounts & Lists</option></select></div>
            </div>
        </div>

    </header>
</body>
</html>
