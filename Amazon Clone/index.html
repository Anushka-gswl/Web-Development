<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="navbar_belt">
            <div class="navbar_logo border">
                <a href="index.html">
                    <img src="amazon_logo.webp" alt="Amazon Logo" id="navbar_logo_img">
                </a>
            </div>
            <div class="location border">
                <p class="location1">Deliver to</p>
                <div class="location_icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="location2">India</p>
                </div>
            </div>
            <div class="nav_search">
                <select class="search_category_select">
                    <option value="all">All</option>
                    <option value="books">Books</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Kitchen</option>
                </select>
                <input type="text" class="search_input" placeholder="  Search Amazon">
                <div class="search_icon">
                    <button class="search_button">
                        <i class="fa-solid fa-magnifying-glass"></i></i>
                    </button>
                </div>
            </div>
            <div class="language_select border">
                <img class="language_icon" src="language_icon.png" alt="Language Icon">
                <select class="language_dropdown">
                    <option value="EN">EN</option>
                    <option value="ES">ES</option>
                    <option value="FR">FR</option>
                    <option value="AR">AR</option>
                    <option value="DE">DE</option>
                    <option value="HE">HE</option>
                </select>
            </div>
            <div class="signin border">
                <p class="signin_text">Hello, Sign in</p>
                <select class="signin_list"><option value="accounts">Accounts & Lists</option></select>
            </div>
            <div class="returns border">
                <p class="return1">Returns</p>
                <p class="return2">& Orders</p>
            </div>
            <div class="cart border">
                <i class="fa-solid fa-cart-shopping cart_icon"></i>
                <p class="cart_text">Cart</p>
            </div>
        </div>
        <div class="navbar2">
            <div class="category border">
                <i class="fa-solid fa-bars menu_icon"></i>
                <p>All</p>
            </div>
            <div class="navbar2_links">
                <a href="#" class="border">Today's Deals</a>
                <a href="#" class="border">Customer Service</a>
                <a href="#" class="border">Gift Cards</a>
                <a href="#" class="border">Registry</a>
                <a href="#" class="border">Sell</a>
            </div>
        </div>
    </header>
</body>
</html>
